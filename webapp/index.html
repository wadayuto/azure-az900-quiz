<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZ-900 過去問道場</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="backdrop"></div>

  <!-- サイドバー -->
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-logo">AZ</div>
      <div class="brand-name">AZ-900<br><small>過去問道場</small></div>
    </div>
    <nav class="nav">
      <button class="nav-item active" data-screen="home">
        <span class="nav-ico">▶</span> 問題を解く
      </button>
      <button class="nav-item" data-screen="list">
        <span class="nav-ico">≣</span> 問題一覧
      </button>
      <button class="nav-item" data-screen="services">
        <span class="nav-ico">▦</span> サービス一覧
      </button>
      <button class="nav-item" data-screen="mypage">
        <span class="nav-ico">★</span> マイページ
      </button>
    </nav>
    <div class="side-foot">Microsoft Azure Fundamentals<br>出典: MCP教科書 AZ-900（翔泳社）</div>
  </aside>

  <!-- モバイルヘッダー -->
  <header id="mobile-header">
    <button id="hamburger" aria-label="メニュー">☰</button>
    <span class="mh-title">AZ-900 過去問道場</span>
    <span class="mh-spacer"></span>
  </header>

  <main id="app"></main>

  <script src="questions.js"></script>
  <script src="services.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
